name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Release, arm64)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: |
          xcodebuild \
            -project "Desk Controller.xcodeproj" \
            -scheme "Desk Controller" \
            -configuration Release \
            -derivedDataPath build \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            MARKETING_VERSION="${{ github.sha }}" \
            build

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: Desk-Controller-macos-arm64
          path: "build/Build/Products/Release/Desk Controller.app"
          archive: false
          if-no-files-found: error
